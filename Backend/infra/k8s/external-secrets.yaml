# ─────────────────────────────────────────────────────────────────────────────
# External Secrets Operator — syncs secrets from AWS Secrets Manager into
# Kubernetes Secrets consumed by the API and Worker pods.
#
# Prerequisites:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# Secrets in AWS Secrets Manager must exist at these paths (see .env.example):
#   /workflow-platform/{env}/app-secrets
#   /workflow-platform/{env}/oauth-secrets
#   /workflow-platform/{env}/llm-secrets
# ─────────────────────────────────────────────────────────────────────────────

---
# ── ClusterSecretStore — one per AWS account/region ──────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets

---
# ── Staging: App Secrets ──────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: workflow-platform-secrets
  namespace: workflow-staging
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: workflow-platform-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /workflow-platform/staging/app-secrets
    - extract:
        key: /workflow-platform/staging/oauth-secrets
    - extract:
        key: /workflow-platform/staging/llm-secrets

---
# ── Production: App Secrets ───────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: workflow-platform-secrets
  namespace: workflow-production
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: workflow-platform-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /workflow-platform/production/app-secrets
    - extract:
        key: /workflow-platform/production/oauth-secrets
    - extract:
        key: /workflow-platform/production/llm-secrets
