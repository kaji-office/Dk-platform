# ─────────────────────────────────────────────────────────────────────────────
# Production environment overrides
# ─────────────────────────────────────────────────────────────────────────────

global:
  environment: production
  awsRegion: us-east-1

namespace: workflow-production

api:
  replicaCount: 4

  ingress:
    host: api.workflowplatform.io
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/healthcheck-path: /v1/health
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/PROD_CERT_ID
      # WAF WebACL
      alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:us-east-1:ACCOUNT_ID:regional/webacl/workflow-prod/WEBACL_ID

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

  hpa:
    minReplicas: 4
    maxReplicas: 20

  iamRoleArn: arn:aws:iam::ACCOUNT_ID:role/workflow-api-production

  env:
    LOG_LEVEL: INFO
    WORKERS: "4"

worker:
  replicaCount: 4
  concurrency: 4

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  hpa:
    minReplicas: 4
    maxReplicas: 30

  iamRoleArn: arn:aws:iam::ACCOUNT_ID:role/workflow-worker-production
