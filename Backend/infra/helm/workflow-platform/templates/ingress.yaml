{{- if and .Values.api.enabled .Values.api.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workflow-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "workflow-platform.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.api.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.api.ingress.className }}
  rules:
    - host: {{ .Values.api.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: workflow-api
                port:
                  number: {{ .Values.api.service.port }}
  {{- if .Values.api.ingress.tlsSecretName }}
  tls:
    - hosts:
        - {{ .Values.api.ingress.host }}
      secretName: {{ .Values.api.ingress.tlsSecretName }}
  {{- end }}
{{- end }}
