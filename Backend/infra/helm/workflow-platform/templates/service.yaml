{{- if .Values.api.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "workflow-platform.labels" . | nindent 4 }}
    app.kubernetes.io/name: workflow-api
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "workflow-platform.api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.targetPort }}
{{- end }}
