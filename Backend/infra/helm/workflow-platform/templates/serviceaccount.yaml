{{- if .Values.api.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.api.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "workflow-platform.labels" . | nindent 4 }}
  annotations:
    # Bind to IAM role via IRSA (set ARN in env-specific values)
    eks.amazonaws.com/role-arn: {{ .Values.api.iamRoleArn | default "" | quote }}
{{- end }}

{{- if .Values.worker.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.worker.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "workflow-platform.labels" . | nindent 4 }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.worker.iamRoleArn | default "" | quote }}
{{- end }}
