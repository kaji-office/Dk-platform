repos:
  # ─────────────────────────────────────────────────────────────────────────────
  # General file hygiene
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]
      - id: detect-private-key
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # ─────────────────────────────────────────────────────────────────────────────
  # Python — Ruff (lint + format, replaces flake8/isort/black)
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        name: ruff-lint
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff-format
        types_or: [python, pyi]

  # ─────────────────────────────────────────────────────────────────────────────
  # Python — mypy (type checking — SDK core only; fast in pre-commit)
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        name: mypy-engine
        args:
          - --config-file=mypy.ini
          - --package=workflow_engine
        pass_filenames: false
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.3
          - motor>=3.4
          - asyncpg>=0.29
          - PyJWT>=2.8
          - httpx>=0.27
          - anthropic>=0.28
          - openai>=1.30
          - jinja2>=3.1
          - jsonschema>=4.22
          - types-jsonschema

  # ─────────────────────────────────────────────────────────────────────────────
  # Python — importlinter (SDK layer boundary enforcement)
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: importlinter
        name: sdk-layer-check
        language: system
        entry: bash -c 'cd packages/workflow-engine && lint-imports'
        pass_filenames: false
        types: [python]

  # ─────────────────────────────────────────────────────────────────────────────
  # Security — detect secrets (blocks commits with credentials)
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)^(
            \.env\.example|
            docs/.*|
            .*\.md
          )$

  # ─────────────────────────────────────────────────────────────────────────────
  # YAML — lint OpenAPI spec and docker-compose
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args:
          - --config-data
          - |
            extends: default
            rules:
              line-length:
                max: 160
              truthy:
                allowed-values: ["true", "false", "yes", "no", "on", "off"]
        files: \.(yaml|yml)$
        exclude: ^\.github/

  # ─────────────────────────────────────────────────────────────────────────────
  # Shell — shellcheck for bash scripts
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: scripts/.*\.sh$
