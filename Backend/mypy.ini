[mypy]
# ─────────────────────────────────────────────────────────────────────────────
# mypy — strict mode for the SDK core; relaxed for delivery packages
# ─────────────────────────────────────────────────────────────────────────────

python_version = 3.12
strict = True

# Error reporting
show_error_codes = True
show_column_numbers = True
pretty = True
error_summary = True

# Imports
ignore_missing_imports = False
follow_imports = normal

# ─────────────────────────────────────────────────────────────────────────────
# Package-level overrides
# ─────────────────────────────────────────────────────────────────────────────

# workflow-engine: strict (default from global strict = True)
[mypy-workflow_engine.*]
strict = True
disallow_any_generics = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_return_any = True
warn_unused_ignores = True

# workflow-api: strict but allow Any for FastAPI dependency injection patterns
[mypy-workflow_api.*]
strict = True
warn_return_any = False

# workflow-worker: strict but allow untyped Celery task decorators
[mypy-workflow_worker.*]
strict = True
disallow_untyped_decorators = False

# workflow-cli: strict
[mypy-workflow_cli.*]
strict = True

# ─────────────────────────────────────────────────────────────────────────────
# Third-party stubs — ignore missing stubs for libs without py.typed
# ─────────────────────────────────────────────────────────────────────────────

[mypy-motor.*]
ignore_missing_imports = True

[mypy-pymongo.*]
ignore_missing_imports = True

[mypy-celery.*]
ignore_missing_imports = True

[mypy-kombu.*]
ignore_missing_imports = True

[mypy-aioboto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-RestrictedPython.*]
ignore_missing_imports = True

[mypy-presidio_analyzer.*]
ignore_missing_imports = True

[mypy-presidio_anonymizer.*]
ignore_missing_imports = True

[mypy-authlib.*]
ignore_missing_imports = True

[mypy-croniter.*]
ignore_missing_imports = True

[mypy-tiktoken.*]
ignore_missing_imports = True

[mypy-opentelemetry.*]
ignore_missing_imports = True

[mypy-pgvector.*]
ignore_missing_imports = True

[mypy-alembic.*]
ignore_missing_imports = True

[mypy-mcp.*]
ignore_missing_imports = True

[mypy-flower.*]
ignore_missing_imports = True

[mypy-rich.*]
ignore_missing_imports = True

[mypy-click.*]
ignore_missing_imports = True

[mypy-google.*]
ignore_missing_imports = True

[mypy-sendgrid.*]
ignore_missing_imports = True

[mypy-stripe.*]
ignore_missing_imports = True
