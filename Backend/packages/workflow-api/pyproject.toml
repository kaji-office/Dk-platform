[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "workflow-api"
version = "1.0.0"
description = "AI Workflow Builder — FastAPI Gateway (Thin delivery layer)"
requires-python = ">=3.12"
license = { text = "Proprietary" }

dependencies = [
    "workflow-engine>=1.0.0",      # The SDK — only internal dep with logic

    # Web framework
    "fastapi>=0.111,<1",
    "uvicorn[standard]>=0.30,<1",
    "python-multipart>=0.0.9",     # Form data support

    # Task queue (dispatch only — no task logic here)
    "celery>=5.4,<6",
    "redis[asyncio]>=5.0,<6",           # redis.asyncio replaces aioredis (Python 3.12 compat)

    # Rate limiting
    "slowapi>=0.1.9,<1",

    # Metrics
    "prometheus-client>=0.20,<1",

    # Database clients — asyncpg used directly for raw SQL in service facades
    # motor is a transitive dep via workflow-engine (MongoDB handled there)
    "asyncpg>=0.29,<1",

    # Alembic migrations
    "alembic>=1.13,<2",

    # Email (stdlib smtplib used by EmailService — no extra dep required)
    # "sendgrid>=6.11,<7",  # uncomment to switch to SendGrid
    # "aiosmtplib>=3.0,<4", # uncomment for async SMTP (currently sync via run_in_executor)
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",                 # TestClient
    "pytest-cov>=5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/workflow_api"]
