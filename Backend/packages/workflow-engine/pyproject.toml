[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "workflow-engine"
version = "1.0.0"
description = "AI Workflow Builder — Core SDK (The Product)"
requires-python = ">=3.12"
license = { text = "Proprietary" }

dependencies = [
    # Core
    "pydantic>=2.7,<3",
    "pydantic-settings>=2.3,<3",
    "httpx>=0.27,<1",

    # Databases
    "motor>=3.4,<4",               # Async MongoDB
    "redis[asyncio]>=5.0,<6",      # redis.asyncio replaces aioredis (Python 3.12 compat)
    "asyncpg>=0.29,<1",            # Async PostgreSQL
    "pgvector>=0.3,<1",            # pgvector extension

    # Storage
    "aioboto3>=12.0,<13",          # Async S3

    # LLM Providers
    "anthropic>=0.28,<1",
    "openai>=1.30,<2",
    "google-genai>=1.0,<2",                # Google Gemini (new unified SDK)
    "boto3>=1.34,<2",              # Amazon Bedrock

    # Sandbox
    "RestrictedPython>=7.0,<8",

    # Privacy
    "presidio-analyzer>=2.2,<3",
    "presidio-anonymizer>=2.2,<3",

    # Auth
    "PyJWT>=2.8,<3",
    "bcrypt>=4.1,<5",
    "pyotp>=2.9,<3",               # TOTP/MFA
    "authlib>=1.3,<2",             # OAuth2

    # MCP
    "mcp>=1.0",

    # Templating, Validation & Data Query
    "jinja2>=3.1,<4",
    "jsonschema>=4.22,<5",
    "jmespath>=1.0,<2",             # JSONPath queries in ControlFlowNode (LOOP/BRANCH)

    # Scheduling
    "croniter>=2.0,<3",
    "pytz>=2024.1",                 # Timezone-aware cron evaluation (cron_utils.py)

    # Token counting — native APIs used (Google: usage_metadata, OpenAI: response.usage)
    # tiktoken kept as fallback for providers without native counting support
    "tiktoken>=0.7,<1",

    # Observability
    "opentelemetry-sdk>=1.24,<2",
    "opentelemetry-instrumentation-httpx>=0.45b0",
    "prometheus-client>=0.20,<1",   # Metrics (observability/metrics.py)
    "python-json-logger>=3.0,<4",   # Structured JSON logging (observability/logging.py)
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "testcontainers[mongodb,postgres,redis]>=4.0",
    "ruff>=0.5",
    "mypy>=1.10",
    "import-linter>=2.0",
    "pre-commit>=3.0",
    "pact-python>=2.0",
    "hypothesis>=6.0",
    "mongomock-motor>=0.0.21",
    "moto[s3]>=5.0",               # AWS S3 mocking
]

[tool.hatch.build.targets.wheel]
packages = ["src/workflow_engine"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=src/workflow_engine --cov-report=term-missing --cov-fail-under=85"

[tool.coverage.run]
omit = ["tests/*", "src/workflow_engine/__init__.py", "src/workflow_engine/ports.py"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
exclude = ["tests/"]
