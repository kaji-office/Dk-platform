[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "workflow-cli"
version = "1.0.0"
description = "AI Workflow Builder — CLI (Developer tool)"
requires-python = ">=3.12"
license = { text = "Proprietary" }

dependencies = [
    "workflow-engine>=1.0.0",      # SDK used locally for offline validation

    # CLI framework
    "click>=8.1,<9",
    "rich>=13.0,<14",              # Terminal formatting

    # HTTP client (API calls)
    "httpx>=0.27,<1",
    "websockets>=12.0,<17",        # wf logs — WS streaming

    # Config
    "tomli>=2.0,<3",               # ~/.workflow/config.toml
    "tomli-w>=1.0,<2",
]

[project.scripts]
wf = "workflow_cli.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/workflow_cli"]
