[tool.ruff]
target-version = "py312"
line-length = 100
src = ["packages/*/src"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
]
ignore = [
    "E501",   # line length (handled by formatter)
    "B008",   # do not perform function calls in default arguments
]

[tool.ruff.lint.isort]
known-first-party = ["workflow_engine", "workflow_api", "workflow_worker", "workflow_cli"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ── importlinter is configured in packages/workflow-engine/.importlinter ──
