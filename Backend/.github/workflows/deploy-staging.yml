name: Deploy → Staging

on:
  push:
    branches: [develop]

# Only one staging deploy at a time
concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  EKS_CLUSTER: workflow-platform-staging
  HELM_RELEASE_API: workflow-api
  HELM_RELEASE_WORKER: workflow-worker
  HELM_CHART_PATH: infra/helm/workflow-platform

# ─────────────────────────────────────────────────────────────────────────────
jobs:
# ─────────────────────────────────────────────────────────────────────────────

  # ── 1. Build & Push Docker Images ────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          IMAGE_TAG="staging-$(git rev-parse --short HEAD)-$(date +%s)"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/workflow-api/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/workflow-api:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/workflow-api:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ENV=staging

      - name: Build & push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/workflow-worker/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/workflow-worker:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/workflow-worker:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ENV=staging

  # ── 2. Run DB Migrations ──────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations (Staging)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Run Alembic migration job
        run: |
          kubectl create job --from=cronjob/alembic-migrate \
            alembic-migrate-${{ github.run_id }} \
            -n workflow-staging \
            --dry-run=client -o yaml \
          | kubectl apply -f -

          kubectl wait --for=condition=complete \
            job/alembic-migrate-${{ github.run_id }} \
            -n workflow-staging \
            --timeout=300s

  # ── 3. Deploy to EKS ─────────────────────────────────────────────────────────
  deploy:
    name: Helm Deploy (Staging)
    runs-on: ubuntu-latest
    needs: [migrate]
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Deploy API (Helm)
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_API }} \
            ${{ env.HELM_CHART_PATH }} \
            --namespace workflow-staging \
            --create-namespace \
            --values infra/helm/values/staging.yaml \
            --set api.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set api.image.repository=${{ env.ECR_REGISTRY }}/workflow-api \
            --atomic \
            --timeout 10m \
            --wait

      - name: Deploy Worker (Helm)
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_WORKER }} \
            ${{ env.HELM_CHART_PATH }} \
            --namespace workflow-staging \
            --values infra/helm/values/staging.yaml \
            --set worker.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set worker.image.repository=${{ env.ECR_REGISTRY }}/workflow-worker \
            --atomic \
            --timeout 10m \
            --wait

  # ── 4. Smoke Tests ────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Tests (Staging)
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - uses: actions/checkout@v4

      - name: API health check
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://api-staging.workflowplatform.io/v1/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Smoke test failed after 10 attempts."
          exit 1

      - name: Notify on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":white_check_mark: Staging deploy complete — `${{ github.ref_name }}` @ `${{ github.sha }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: Staging deploy FAILED — `${{ github.ref_name }}` @ `${{ github.sha }}`. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
