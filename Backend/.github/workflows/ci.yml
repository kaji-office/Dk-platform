name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Lint & Format ─────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Ruff lint
        run: ruff check packages/

      - name: Ruff format check
        run: ruff format --check packages/

  # ── 2. Type Check (SDK) ──────────────────────────────────────────────────────
  typecheck:
    name: mypy (workflow-engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install engine + type stubs
        run: |
          pip install -e "packages/workflow-engine[dev]"
          pip install types-jsonschema

      - name: mypy
        run: mypy packages/workflow-engine/src/workflow_engine --config-file mypy.ini

  # ── 3. Layer Boundaries ──────────────────────────────────────────────────────
  layer-check:
    name: SDK Layer Boundaries (import-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install engine
        run: pip install -e "packages/workflow-engine[dev]"

      - name: lint-imports
        run: cd packages/workflow-engine && lint-imports

  # ── 4. Unit Tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install engine (dev)
        run: pip install -e "packages/workflow-engine[dev]"

      - name: Run unit tests
        run: |
          pytest packages/workflow-engine/tests/unit \
            -v \
            --tb=short \
            --cov=packages/workflow-engine/src/workflow_engine \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=85

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false

  # ── 5. Integration Tests ─────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: workflow
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: workflow_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGODB_URL: mongodb://localhost:27017/workflow_platform_test
      POSTGRES_URL: postgresql+asyncpg://workflow:devpassword@localhost:5432/workflow_platform
      POSTGRES_URL_ASYNCPG: postgresql+asyncpg://workflow:devpassword@localhost:5432/workflow_platform
      REDIS_URL: redis://localhost:6379/0
      S3_BUCKET: workflow-platform-test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      JWT_ALGORITHM: RS256

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install engine (dev)
        run: pip install -e "packages/workflow-engine[dev]"

      - name: Generate test JWT keys
        run: |
          mkdir -p keys
          openssl genrsa -out keys/private.pem 2048
          openssl rsa -in keys/private.pem -pubout -out keys/public.pem
          echo "JWT_PRIVATE_KEY_PATH=./keys/private.pem" >> $GITHUB_ENV
          echo "JWT_PUBLIC_KEY_PATH=./keys/public.pem" >> $GITHUB_ENV

      - name: Apply DB migrations
        run: |
          pip install -e "packages/workflow-api[dev]"
          cd packages/workflow-api && alembic upgrade head
          cd ../..
          python -m infra.database.mongodb.indexes

      - name: Run integration tests
        run: |
          pytest packages/workflow-engine/tests/integration \
            -v \
            --tb=short \
            --timeout=120

  # ── 6. API Tests ─────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: workflow
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: workflow_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGODB_URL: mongodb://localhost:27017/workflow_platform_test
      POSTGRES_URL: postgresql+asyncpg://workflow:devpassword@localhost:5432/workflow_platform
      POSTGRES_URL_ASYNCPG: postgresql+asyncpg://workflow:devpassword@localhost:5432/workflow_platform
      REDIS_URL: redis://localhost:6379/0
      S3_BUCKET: workflow-platform-test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      JWT_ALGORITHM: RS256
      ANTHROPIC_API_KEY: sk-test-placeholder
      OPENAI_API_KEY: sk-test-placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install packages
        run: |
          pip install -e "packages/workflow-engine[dev]"
          pip install -e "packages/workflow-api[dev]"

      - name: Generate test JWT keys
        run: |
          mkdir -p keys
          openssl genrsa -out keys/private.pem 2048
          openssl rsa -in keys/private.pem -pubout -out keys/public.pem
          echo "JWT_PRIVATE_KEY_PATH=./keys/private.pem" >> $GITHUB_ENV
          echo "JWT_PUBLIC_KEY_PATH=./keys/public.pem" >> $GITHUB_ENV

      - name: Apply DB migrations
        run: |
          cd packages/workflow-api && alembic upgrade head
          cd ../..
          python -m infra.database.mongodb.indexes

      - name: Run API tests
        run: |
          pytest packages/workflow-api/tests \
            -v \
            --tb=short \
            --timeout=60

  # ── 7. Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: packages/workflow-ui/package-lock.json

      - name: Install dependencies
        working-directory: packages/workflow-ui
        run: npm ci

      - name: TypeScript check
        working-directory: packages/workflow-ui
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: packages/workflow-ui
        run: npx eslint . --max-warnings 0

      - name: Build
        working-directory: packages/workflow-ui
        run: npm run build

  # ── 8. Docker build (smoke test) ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/workflow-api/Dockerfile
          push: false
          tags: workflow-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/workflow-worker/Dockerfile
          push: false
          tags: workflow-worker:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Gate: All CI checks must pass ────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - layer-check
      - unit-tests
      - integration-tests
      - api-tests
      - frontend
      - docker-build
    steps:
      - run: echo "All CI checks passed."
