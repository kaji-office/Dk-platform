name: Deploy → Production

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # e.g. v1.0.0, v1.2.3

# Serialize production deploys — never cancel in progress
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  EKS_CLUSTER: workflow-platform-production
  HELM_RELEASE_API: workflow-api
  HELM_RELEASE_WORKER: workflow-worker
  HELM_CHART_PATH: infra/helm/workflow-platform

# ─────────────────────────────────────────────────────────────────────────────
jobs:
# ─────────────────────────────────────────────────────────────────────────────

  # ── 1. Validate tag is on main ────────────────────────────────────────────────
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag is reachable from main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "ERROR: Tag ${{ github.ref_name }} is not on the main branch."
            exit 1
          fi
          echo "Tag validated — commit is on main."

  # ── 2. Build & Push Docker Images ────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [validate-tag]
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag from git tag
        id: meta
        run: |
          IMAGE_TAG="${{ github.ref_name }}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/workflow-api/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/workflow-api:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/workflow-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ENV=production

      - name: Build & push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/workflow-worker/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/workflow-worker:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/workflow-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ENV=production

  # ── 3. Production Gate (manual approval required) ─────────────────────────────
  production-approval:
    name: "Awaiting production approval"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production    # GitHub environment with required reviewers configured

    steps:
      - name: Approval granted
        run: echo "Production deployment approved for ${{ github.ref_name }}."

  # ── 4. Run DB Migrations ──────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations (Production)
    runs-on: ubuntu-latest
    needs: [production-approval]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Run Alembic migration job
        run: |
          kubectl create job --from=cronjob/alembic-migrate \
            alembic-migrate-${{ github.run_id }} \
            -n workflow-production \
            --dry-run=client -o yaml \
          | kubectl apply -f -

          kubectl wait --for=condition=complete \
            job/alembic-migrate-${{ github.run_id }} \
            -n workflow-production \
            --timeout=300s

  # ── 5. Deploy to EKS (Rolling — zero downtime) ───────────────────────────────
  deploy:
    name: Helm Deploy (Production)
    runs-on: ubuntu-latest
    needs: [migrate]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Deploy API (Helm — rolling update)
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_API }} \
            ${{ env.HELM_CHART_PATH }} \
            --namespace workflow-production \
            --values infra/helm/values/production.yaml \
            --set api.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set api.image.repository=${{ env.ECR_REGISTRY }}/workflow-api \
            --set api.updateStrategy.type=RollingUpdate \
            --set api.updateStrategy.rollingUpdate.maxUnavailable=0 \
            --set api.updateStrategy.rollingUpdate.maxSurge=1 \
            --atomic \
            --timeout 15m \
            --wait

      - name: Deploy Worker (Helm)
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_WORKER }} \
            ${{ env.HELM_CHART_PATH }} \
            --namespace workflow-production \
            --values infra/helm/values/production.yaml \
            --set worker.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set worker.image.repository=${{ env.ECR_REGISTRY }}/workflow-worker \
            --atomic \
            --timeout 15m \
            --wait

  # ── 6. Post-deploy Verification ──────────────────────────────────────────────
  verify:
    name: Post-deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - uses: actions/checkout@v4

      - name: API health check
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://api.workflowplatform.io/v1/health)
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed."
              exit 0
            fi
            echo "Attempt $i: got $STATUS, waiting 15s..."
            sleep 15
          done
          echo "Production health check FAILED."
          exit 1

      - name: Create GitHub Release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":rocket: *Production deploy complete* — `${{ github.ref_name }}` deployed successfully to https://api.workflowplatform.io"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

      - name: Notify failure + trigger rollback hint
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":fire: *Production deploy FAILED* — `${{ github.ref_name }}`. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>. Run `helm rollback workflow-api -n workflow-production` to revert."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
